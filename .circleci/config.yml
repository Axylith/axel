stages:
  - build
  - test

# Shared deps installed via YAML anchor — reused across jobs
.deps: &install_deps
  - apt-get update -qq
  - apt-get install -y -qq
      cmake ninja-build
      libvulkan-dev vulkan-validationlayers
      libx11-dev libxext-dev
      libwayland-dev wayland-protocols
      glslc
      > /dev/null 2>&1

default:
  image: debian:bookworm-slim

build-release:
  stage: build
  before_script:
    - apt-get install -y -qq g++
    - *install_deps
  script:
    - cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
    - cmake --build build -j$(nproc)
    - ls -lh build/axylith
  artifacts:
    paths:
      - build/axylith
    expire_in: 1 week

build-strict:
  stage: build
  before_script:
    - apt-get install -y -qq g++
    - *install_deps
  script:
    - cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-Werror"
    - cmake --build build -j$(nproc)

build-clang:
  stage: build
  before_script:
    - apt-get install -y -qq clang
    - *install_deps
  script:
    - cmake -B build -G Ninja
        -DCMAKE_BUILD_TYPE=Debug
        -DCMAKE_C_COMPILER=clang
        -DCMAKE_CXX_COMPILER=clang++
    - cmake --build build -j$(nproc)

test-axl:
  stage: test
  before_script:
    - apt-get install -y -qq g++
    - *install_deps
  script:
    - cmake -B build -G Ninja
    - cmake --build build -j$(nproc)
    - cd build && ctest --output-on-failure