version: 2.1

jobs:
  build-gcc:
    docker:
      - image: debian:bookworm-slim
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            apt-get update -qq
            apt-get install -y -qq g++ libvulkan-dev libx11-dev > /dev/null 2>&1
      - run:
          name: Build (GCC)
          command: |
            g++ -std=c++20 -O2 -Wall -Wextra -Wpedantic \
              -o axylith window.cpp \
              -lvulkan -lX11
            ls -lh axylith

  build-clang:
    docker:
      - image: debian:bookworm-slim
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            apt-get update -qq
            apt-get install -y -qq clang libvulkan-dev libx11-dev > /dev/null 2>&1
      - run:
          name: Build (Clang)
          command: |
            clang++ -std=c++20 -O2 -Wall -Wextra -Wpedantic \
              -o axylith-clang window.cpp \
              -lvulkan -lX11
            ls -lh axylith-clang

  test-axl:
    docker:
      - image: debian:bookworm-slim
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            apt-get update -qq
            apt-get install -y -qq g++ > /dev/null 2>&1
      - run:
          name: Run tests
          command: |
            g++ -std=c++20 -O2 -o axl_test axl_test.cpp
            ./axl_test

workflows:
  build-and-test:
    jobs:
      - build-gcc
      - build-clang
      - test-axl