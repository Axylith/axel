stages:
  - build
  - test
  - analyze

build-release:
  stage: build
  image: debian:bookworm-slim
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq g++ cmake make libvulkan-dev libx11-dev > /dev/null 2>&1
  script:
    - mkdir build && cd build
    - cmake .. -DCMAKE_BUILD_TYPE=Release
    - make -j$(nproc)
    - ls -lh axylith
  artifacts:
    paths:
      - build/axylith
    expire_in: 1 week

build-strict:
  stage: build
  image: debian:bookworm-slim
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq g++ cmake make libvulkan-dev libx11-dev > /dev/null 2>&1
  script:
    - mkdir build && cd build
    - cmake .. -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-Werror"
    - make -j$(nproc)

build-clang:
  stage: build
  image: debian:bookworm-slim
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq clang cmake make libvulkan-dev libx11-dev > /dev/null 2>&1
  script:
    - mkdir build && cd build
    - cmake .. -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
    - make -j$(nproc)

test-axl:
  stage: test
  image: debian:bookworm-slim
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq g++ cmake make > /dev/null 2>&1
  script:
    - mkdir build && cd build
    - cmake ..
    - make -j$(nproc)
    - ctest --output-on-failure