name: clang-tidy
on: [push, pull_request]

jobs:
  tidy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy cmake ninja-build \
            libvulkan-dev libx11-dev libxext-dev
      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Run clang-tidy
        run: |
          find src -name '*.cpp' | xargs -I{} clang-tidy -p build {} \
            --warnings-as-errors=* \
            --checks='-*,bugprone-*,cert-*,clang-analyzer-*,modernize-*,performance-*,readability-*,-readability-identifier-length,-modernize-use-trailing-return-type'